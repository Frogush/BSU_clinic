<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Поликлиника БелГУ</title>
    </head>
    <body class="page">
        <header class="header">
            <div class="header__container">
                <button class="header__burger" type="button" aria-label="Открыть меню">
                    <svg
                        width="36"
                        height="25"
                        viewBox="0 0 36 25"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <rect width="36" height="3" rx="1.5" fill="#0061FF" />
                        <rect y="11" width="36" height="3" rx="1.5" fill="#0061FF" />
                        <rect y="22" width="36" height="3" rx="1.5" fill="#0061FF" />
                    </svg>
                </button>

                <a href="/index.html" class="header__logo-link">
                    <picture class="header__logo-picture">
                        <source
                            media="(min-width: 768px)"
                            srcset="<%=require('../images/desktop_icon.png')%>"
                        />
                        <img
                            class="header__logo-img"
                            src="<%=require('../images/mobile_icon.png')%>"
                            alt="Логотип Поликлиника НИУ БелГУ"
                        />
                    </picture>
                </a>

                <div class="header__desktop-group">
                    <p class="header__title">Поликлиника БелГУ</p>
                    <nav class="header__nav">
                        <ul class="header__nav-list">
                            <li class="header__nav-item">
                                <a href="/index.html" class="header__nav-link"
                                    >Главная</a
                                >
                            </li>
                            <li class="header__nav-item">
                                <a href="/pages/about.html" class="header__nav-link">О нас</a>

                            <li class="header__nav-item">
                                <a href="/pages/patients.html" class="header__nav-link">Для пациента</a>

                            <li class="header__nav-item">
                                <a href="/pages/news.html" class="header__nav-link header__nav-link_active">Новости</a>
                            </li>
                            <li class="header__nav-item">
                                <a href="/pages/specialists.html" class="header__nav-link">Специалисты</a>
                            </li>
                            <li class="header__nav-item">
                                <a href="/pages/services.html" class="header__nav-link">Услуги</a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <button class="header__admin-btn" type="button">
                    Админ панель
                    <svg
                        width="12"
                        height="10"
                        viewBox="0 0 12 10"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                            fill-rule="evenodd"
                            clip-rule="evenodd"
                            d="M0 5C0 4.81059 0.079009 4.62895 0.219646 4.49502C0.360282 4.36109 0.551026 4.28584 0.749916 4.28584H9.43845L6.21831 1.22068C6.07749 1.08658 5.99838 0.904705 5.99838 0.715059C5.99838 0.525414 6.07749 0.343536 6.21831 0.209436C6.35912 0.0753365 6.5501 0 6.74925 0C6.94839 0 7.13937 0.0753365 7.28019 0.209436L11.7797 4.49438C11.8495 4.56072 11.9049 4.63952 11.9427 4.72629C11.9805 4.81305 12 4.90606 12 5C12 5.09394 11.9805 5.18695 11.9427 5.27371C11.9049 5.36048 11.8495 5.43928 11.7797 5.50562L7.28019 9.79056C7.13937 9.92466 6.94839 10 6.74925 10C6.5501 10 6.35912 9.92466 6.21831 9.79056C6.07749 9.65646 5.99838 9.47459 5.99838 0.715059C5.99838 9.0953 6.07749 8.91342 6.21831 8.77932L9.43845 5.71416H0.749916C0.551026 5.71416 0.360282 5.63892 0.219646 5.50499C0.079009 5.37106 0 5.18941 0 5Z"

                        />
                    </svg>
                </button>
            </div>

            <div class="header__overlay" role="presentation"></div>

            <aside class="header__sidebar" aria-modal="true" role="dialog">
                <div class="header__sidebar-content">
                    <button class="header__sidebar-close" type="button" aria-label="Закрыть меню">
                        <svg
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M18 6L6 18M6 6L18 18"
                                stroke="#0061FF"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                    </button>

                    <p class="header__sidebar-title">Поликлиника БелГУ</p>

                    <nav class="header__sidebar-nav">
                        <ul class="header__sidebar-list">
                            <li class="header__sidebar-item">
                                <a href="/index.html" class="header__sidebar-link header__sidebar-link_active"
                                    >Главная</a
                                >
                            </li>
                            <li class="header__sidebar-item">
                                <a href="/pages/about.html" class="header__sidebar-link">О нас</a>
                            </li>
                            <li class="header__sidebar-item">
                                <a href="/pages/patients.html" class="header__sidebar-link">Для пациента</a>
                            </li>
                            <li class="header__sidebar-item">
                                <a href="/pages/news.html" class="header__sidebar-link">Новости</a>
                            </li>
                            <li class="header__sidebar-item">
                                <a href="/pages/specialists.html" class="header__sidebar-link">Специалисты</a>
                            </li>
                            <li class="header__sidebar-item">

                            </li>
                        </ul>
                    </nav>
                </div>
            </aside>
        </header>
    </body>
</html>
